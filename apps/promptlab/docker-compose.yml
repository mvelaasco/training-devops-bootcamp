services:
  api:
    build: ./backend
    ports:
      - "${API_PORT}:3001"
    environment:
      - NODE_ENV=${NODE_ENV}
    networks:
      - promptlab
    volumes:
      - api-data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - api
    networks:
      - promptlab

networks:
  promptlab:

volumes:
  api-data: