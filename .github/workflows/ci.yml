name: PromptLab CI

on:
  push:
    branches:
      - feature/ci-cd
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/promptlab/backend/package-lock.json

      - name: Install dependencies
        working-directory: ./apps/promptlab/backend
        run: npm ci

      - name: Run tests
        working-directory: ./apps/promptlab/backend
        run: npm test
