name: CI Pipeline

on:
  push:
permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
        working-directory: ./apps/promptlab/backend
      - run: mkdir -p data
        working-directory: ./apps/promptlab/backend
      - run: npm test
        working-directory: ./apps/promptlab/backend
        env:
          DB_PATH: /tmp/promptlab-ci.db

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
        working-directory: ./apps/promptlab/backend
      - run: npm run lint
        working-directory: ./apps/promptlab/backend

  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./apps/promptlab/backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/promptlab-api:latest
            ghcr.io/${{ github.repository_owner }}/promptlab-api:${{ github.sha }}

      - name: Build and push Frontend image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./apps/promptlab/frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/promptlab-frontend:latest
            ghcr.io/${{ github.repository_owner }}/promptlab-frontend:${{ github.sha }}