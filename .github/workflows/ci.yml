name: CI Pipeline
on:
  push:
  pull_request:
permissions:
  contents: read
  packages: write
  pull-requests: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/promptlab/backend/package-lock.json
      - run: npm ci
        working-directory: ./apps/promptlab/backend
      - run: npm test
        working-directory: ./apps/promptlab/backend
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/promptlab/backend/package-lock.json
      - run: npm ci
        working-directory: ./apps/promptlab/backend
      - run: npm run lint
        working-directory: ./apps/promptlab/backend
  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./apps/promptlab/backend
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/promptlab-api:latest
            ghcr.io/${{ github.repository_owner }}/promptlab-api:${{ github.sha }}
      - uses: docker/build-push-action@v5
        with:
          context: ./apps/promptlab/frontend
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/promptlab-frontend:latest
            ghcr.io/${{ github.repository_owner }}/promptlab-frontend:${{ github.sha }}
  notify:
    runs-on: ubuntu-latest
    needs: [test, lint, build]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **CI passed!** Tests, lint, and build all green.'
            })