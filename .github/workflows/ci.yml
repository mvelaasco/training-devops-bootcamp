  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: promptlab-api:latest

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: promptlab-frontend:latest