name: CI Pipeline

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
        working-directory: ./apps/promptlab/backend
      - run: mkdir -p data
        working-directory: ./apps/promptlab/backend
      - run: npm test
        working-directory: ./apps/promptlab/backend
        env:
          DB_PATH: /tmp/promptlab-ci.db

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
        working-directory: ./apps/promptlab/backend
      - run: npm run lint
        working-directory: ./apps/promptlab/backend

  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/promptlab/backend
          push: false
          tags: promptlab-api:latest

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/promptlab/frontend
          push: false
          tags: promptlab-frontend:latest
          